name: Build and publish NPM packages

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build & Publish NPM packages
    runs-on: ubuntu-latest
    environment: npmjs

    steps:
      - name: Get sources
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test devextreme-schematics
        run: pnpm --filter devextreme-schematics run test

      - name: Build devextreme-schematics
        run: pnpm --filter devextreme-schematics run build

      - name: Publish package
        run: pnpm --filter './packages/*' publish --provenance --dry-run
